repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^remotion/src/.*\.(ts|tsx|json)$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: schemas-check
        name: schemas-check (codegen freshness)
        entry: make schemas-check
        language: system
        pass_filenames: false
        files: ^schemas/.*\.schema\.json$

      - id: check-contracts
        name: check-contracts (D18 cross-agent registry)
        entry: make check-contracts
        language: system
        pass_filenames: false
        files: ^(schemas/contracts\.json|src/demo_video_generator/run\.py)$
